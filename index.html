<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedro Pazzo</title>
  <meta name="description" content="Pedro records music somewhere in Finland.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --burgundy: #800020;
      --black:    #0A0A0A;
      --white:    #F2F2F0;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      background: var(--black);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      overflow-x: hidden;
    }

    /* ── Ember blobs ──────────────────────────────── */

    .blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      background: var(--burgundy);
      filter: blur(90px);
    }

    .b1 {
      width: 60vw; height: 60vw;
      top: -14%; left: -20%;
      opacity: 0.18;
      animation: drift1 28s ease-in-out infinite;
    }
    .b2 {
      width: 52vw; height: 52vw;
      bottom: -20%; right: -16%;
      opacity: 0.14;
      animation: drift2 38s ease-in-out infinite;
    }
    .b3 {
      width: 40vw; height: 40vw;
      top: 28%; left: 50%;
      opacity: 0.10;
      animation: drift3 22s ease-in-out infinite;
    }

    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0); }
      35%       { transform: translate(14vw, 10vh); }
      70%       { transform: translate(4vw, 18vh); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0); }
      40%       { transform: translate(-14vw, -12vh); }
      75%       { transform: translate(-6vw, 8vh); }
    }
    @keyframes drift3 {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(-16vw, -14vh); }
    }

    /* ── Main (receives mouse parallax) ──────────── */

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      will-change: transform;
      transition: transform 0.12s ease-out;
    }

    /* ── Nameplate — slowly sways, never settles ── */

    .nameplate {
      width: 106vw;
      margin-left: -3vw;
      background: var(--burgundy);
      padding: 1.6rem 4vw;
      transform-origin: center center;
      animation: stripe-sway 18s ease-in-out infinite;
      margin-bottom: 4rem;
    }

    @keyframes stripe-sway {
      0%         { transform: rotate(-1.2deg); }
      28%        { transform: rotate(-2.6deg); }
      58%        { transform: rotate(-0.2deg); }
      80%        { transform: rotate(-1.9deg); }
      100%       { transform: rotate(-1.2deg); }
    }

    h1 {
      font-family: 'Bungee', Impact, 'Arial Black', sans-serif;
      font-size: clamp(2.8rem, 10vw, 6.5rem);
      font-weight: 400;
      color: var(--white);
      text-align: center;
      letter-spacing: 0.06em;
      line-height: 1;
      text-transform: uppercase;
    }

    .name-char {
      display: inline-block;
    }

    /* ── Content ──────────────────────────────────── */

    .content {
      max-width: 500px;
      margin: 0 auto;
      padding: 0 2rem;
      text-align: center;
    }

    .bio {
      font-weight: 500;
      font-size: clamp(1.15rem, 3vw, 1.3rem);
      color: rgba(242, 242, 240, 0.88);
      line-height: 1.8;
      letter-spacing: 0.01em;
      margin-bottom: 3rem;
    }

    /* ── Links ────────────────────────────────────── */

    nav {
      display: flex;
      justify-content: center;
      gap: 2.4rem;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--brand, var(--white));
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      opacity: 0.72;
      transition: opacity 0.22s ease;
    }

    nav a:hover {
      opacity: 1;
    }

    nav a:focus-visible {
      outline: 1px solid var(--burgundy);
      outline-offset: 4px;
      border-radius: 2px;
    }

  </style>
</head>
<body>

  <div class="blobs" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <main id="main">
    <div class="nameplate">
      <h1 id="name">Pedro Pazzo</h1>
    </div>

    <div class="content">
      <p class="bio">
        Pedro records music somewhere in Finland.<br>
        He is making it up as he goes.<br>
        He thinks that is probably enough.
      </p>

      <nav aria-label="Music platforms">
        <a href="#" rel="noopener noreferrer" style="--brand:#1DB954">Il Spottifino</a>
        <a href="#" rel="noopener noreferrer" style="--brand:#1DA0C3">El Campo</a>
        <a href="#" rel="noopener noreferrer" style="--brand:#FC3C44">Appel</a>
        <a href="#" rel="noopener noreferrer" style="--brand:#E1306C">Social Media de Instagrammo</a>
      </nav>
    </div>
  </main>

  <script>
    // ── Mouse parallax (desktop only) ────────────────
    (function () {
      if (!window.matchMedia('(hover: hover)').matches) return;
      var main = document.getElementById('main');
      document.addEventListener('mousemove', function (e) {
        var cx = window.innerWidth  / 2;
        var cy = window.innerHeight / 2;
        var dx = (e.clientX - cx) / cx;
        var dy = (e.clientY - cy) / cy;
        main.style.transform =
          'perspective(1000px) rotateX(' + (dy * -1.2) + 'deg) rotateY(' + (dx * 1.2) + 'deg)';
      });
      document.addEventListener('mouseleave', function () {
        main.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
      });
    }());

    // ── Wrap h1 chars for glitch targeting ───────────
    (function () {
      var h1 = document.getElementById('name');
      h1.innerHTML = h1.textContent.split('').map(function (c) {
        if (c === ' ') return '<span style="display:inline-block;width:0.3em"> </span>';
        return '<span class="name-char">' + c + '</span>';
      }).join('');
    }());

    // ── VHS letter glitch ─────────────────────────────
    // Every 30–60s, one letter briefly flickers and swaps — like a tracking error.
    (function () {
      var CHARS = 'BDFGHJKLMNQRSTVWXYZ023456789#%?';

      function glitch () {
        var chars = document.querySelectorAll('.name-char');
        var el    = chars[Math.floor(Math.random() * chars.length)];
        var orig  = el.textContent;

        // First flicker
        el.textContent  = CHARS[Math.floor(Math.random() * CHARS.length)];
        el.style.cssText = 'display:inline-block;color:#C0405A;text-shadow:2px 0 rgba(0,200,255,0.7),-2px 0 rgba(255,0,100,0.7);transform:translateY(-2px) scaleX(1.08)';

        setTimeout(function () {
          // Second flicker (different char)
          el.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
          setTimeout(function () {
            // Snap back
            el.textContent  = orig;
            el.style.cssText = 'display:inline-block';
          }, 55);
        }, 70);

        setTimeout(glitch, 28000 + Math.random() * 32000);
      }

      setTimeout(glitch, 22000 + Math.random() * 12000);
    }());

    // ── Tab title has its own opinions ───────────────
    (function () {
      var sequence = [
        ['Pedro Pazzo',   10000],
        ['a website',      4000],
        ['Pedro Pazzo',   13000],
        ['probably fine',  4000],
        ['Pedro Pazzo',    9000],
        ['(music)',         4000],
        ['Pedro Pazzo',   11000],
        ['he made this',   4000],
      ];
      var i = 0;
      function next () {
        var step = sequence[i % sequence.length];
        document.title = step[0];
        i++;
        setTimeout(next, step[1]);
      }
      setTimeout(next, 16000);
    }());
  </script>

</body>
</html>
